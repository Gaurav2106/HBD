<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday 🎂</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Dancing+Script:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap');

/* ============================================================
   PERSONALIZE ME — scroll to the CONFIG object near the top of
   the <script> at the bottom of this file to change the name,
   letter, memories and final message. Everything else is engine.
   ============================================================ */

:root{
  --black:#08050a;
  --black2:#12070f;
  --black3:#1c0a16;
  --pink:#ff3d7d;
  --pink-soft:#ff8fb8;
  --pink-pale:#ffd7e6;
  --gold:#ffd27a;
  --glow: rgba(255,61,125,.55);
  --font-display:'Playfair Display', serif;
  --font-hand:'Dancing Script', cursive;
  --font-body:'Quicksand', sans-serif;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; height:100%; background:var(--black); overflow:hidden; font-family:var(--font-body);}
body{
  background:
    radial-gradient(circle at 20% 10%, rgba(255,61,125,0.16), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(255,150,190,0.12), transparent 40%),
    linear-gradient(180deg, var(--black) 0%, var(--black2) 55%, var(--black3) 100%);
  color:var(--pink-pale);
}

#app{position:fixed; inset:0; width:100%; height:100%; max-width:560px; margin:0 auto; overflow:hidden;}

/* ---------- sound toggle ---------- */
#soundToggle{
  position:absolute; top:18px; right:18px; z-index:60;
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,150,190,0.35);
  color:var(--pink-pale); font-size:18px; display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(6px); cursor:pointer; transition:transform .2s ease, box-shadow .3s ease;
  box-shadow:0 0 18px rgba(255,61,125,0.15);
}
#soundToggle:active{transform:scale(0.9);}

/* ---------- screens ---------- */
.screen{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px; text-align:center; opacity:0; transform:scale(0.95) translateY(10px); filter:blur(10px);
  pointer-events:none; transition:opacity .9s cubic-bezier(.4,0,.2,1), transform .9s cubic-bezier(.4,0,.2,1), filter .9s ease;
}
.screen.active{opacity:1; transform:scale(1) translateY(0); filter:blur(0); pointer-events:auto;}

.eyebrow{
  font-family:var(--font-body); letter-spacing:.35em; text-transform:uppercase; font-size:11px;
  color:var(--pink-soft); opacity:.75; margin-bottom:10px;
}
h1.title{font-family:var(--font-display); font-weight:700; font-size:clamp(26px,7vw,38px); margin:0 0 14px; color:#fff; text-shadow:0 0 22px var(--glow);}
p.sub{font-size:15px; line-height:1.6; color:var(--pink-pale); opacity:.85; max-width:340px; margin:0 auto;}

/* glow button */
.glow-btn{
  margin-top:34px; padding:15px 34px; border-radius:999px; border:1px solid rgba(255,150,190,.5);
  background:linear-gradient(135deg, rgba(255,61,125,.9), rgba(255,140,180,.7));
  color:#fff; font-family:var(--font-body); font-weight:600; font-size:15px; letter-spacing:.03em;
  cursor:pointer; box-shadow:0 0 25px var(--glow), inset 0 0 12px rgba(255,255,255,.15);
  transition:transform .2s ease, box-shadow .3s ease; position:relative; overflow:hidden;
}
.glow-btn:active{transform:scale(0.94);}
.glow-btn::after{
  content:""; position:absolute; inset:0; border-radius:999px;
  box-shadow:0 0 0 0 rgba(255,61,125,.5); animation:pulseRing 2.6s ease-out infinite;
}
@keyframes pulseRing{
  0%{box-shadow:0 0 0 0 rgba(255,61,125,.45);}
  70%{box-shadow:0 0 0 16px rgba(255,61,125,0);}
  100%{box-shadow:0 0 0 0 rgba(255,61,125,0);}
}
.ghost-btn{
  margin-top:14px; background:none; border:none; color:var(--pink-soft); font-family:var(--font-body);
  font-size:13px; text-decoration:underline; opacity:.75; cursor:pointer;
}

/* ---------- floating hearts / particles ---------- */
.heart-particle{
  position:absolute; bottom:-30px; font-size:16px; color:var(--pink-soft); opacity:.8; pointer-events:none;
  animation:floatUp linear forwards; filter:drop-shadow(0 0 6px var(--glow));
}
@keyframes floatUp{
  0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:0;}
  10%{opacity:.9;}
  90%{opacity:.7;}
  100%{transform:translateY(-115vh) translateX(var(--drift,20px)) rotate(25deg); opacity:0;}
}

/* ---------- landing ---------- */
#screen-landing{z-index:5;}
.envelope-wrap{position:relative; width:120px; height:90px; margin-bottom:26px;}
.envelope{
  width:100%; height:100%; background:linear-gradient(135deg,#2a0f1e,#160810); border-radius:8px;
  box-shadow:0 0 40px var(--glow), inset 0 0 20px rgba(255,150,190,.15); position:relative; overflow:hidden;
  border:1px solid rgba(255,150,190,.3);
}
.envelope::before{
  content:""; position:absolute; top:0; left:0; width:0; height:0;
  border-left:60px solid transparent; border-right:60px solid transparent; border-top:46px solid rgba(255,150,190,.18);
}
.envelope-heart{position:absolute; top:50%; left:50%; transform:translate(-50%,-45%); font-size:22px; animation:heartbeat 1.8s ease-in-out infinite;}
@keyframes heartbeat{0%,100%{transform:translate(-50%,-45%) scale(1);}50%{transform:translate(-50%,-45%) scale(1.18);}}

/* ---------- balloons scene ---------- */
#screen-balloons{z-index:5;}
.balloon-field{position:absolute; inset:0; overflow:hidden;}
.balloon{
  position:absolute; bottom:-140px; width:64px; height:80px; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  cursor:pointer; animation:floatBalloon linear infinite; will-change:transform;
  box-shadow:inset -10px -10px 18px rgba(0,0,0,.25), inset 8px 8px 14px rgba(255,255,255,.25), 0 0 22px var(--glow);
}
.balloon::after{
  content:""; position:absolute; left:50%; bottom:-34px; width:1px; height:34px; background:rgba(255,200,220,.4); transform:translateX(-50%);
}
.balloon.pop{animation:none !important; transform:scale(1.35); opacity:0; transition:transform .28s ease, opacity .28s ease;}
@keyframes floatBalloon{
  0%{transform:translateY(0) translateX(0) rotate(-4deg);}
  50%{transform:translateY(-58vh) translateX(var(--sway,18px)) rotate(4deg);}
  100%{transform:translateY(-118vh) translateX(0) rotate(-4deg);}
}
.balloon-hint{position:absolute; top:24px; width:100%; text-align:center; z-index:2;}

/* ---------- cake scene ---------- */
#screen-cake{z-index:5;}
.cake-wrap{position:relative; margin-top:10px;}
.cake{position:relative; width:220px;}
.plate{width:250px; height:14px; border-radius:50%; background:linear-gradient(180deg, rgba(255,150,190,.35), rgba(255,150,190,.05)); margin:0 auto; box-shadow:0 0 30px rgba(255,61,125,.25);}
.tier{border-radius:14px; margin:0 auto; position:relative;}
.tier1{width:220px; height:56px; background:linear-gradient(180deg,#3a1224,#220a16); box-shadow:inset 0 -8px 14px rgba(0,0,0,.35), 0 8px 20px rgba(0,0,0,.4);}
.tier2{width:170px; height:50px; background:linear-gradient(180deg,#4a1830,#2a0e1c); margin-top:-6px; box-shadow:inset 0 -8px 14px rgba(0,0,0,.35), 0 8px 20px rgba(0,0,0,.4);}
.drip{position:absolute; top:-10px; left:0; width:100%; height:16px; background:
  radial-gradient(circle at 10% 0, var(--pink-soft) 5px, transparent 6px),
  radial-gradient(circle at 30% 0, var(--pink-soft) 6px, transparent 7px),
  radial-gradient(circle at 55% 0, var(--pink-soft) 5px, transparent 6px),
  radial-gradient(circle at 75% 0, var(--pink-soft) 7px, transparent 8px),
  radial-gradient(circle at 95% 0, var(--pink-soft) 5px, transparent 6px);
}
.icing-name{
  position:absolute; top:-42px; left:50%; transform:translateX(-50%); font-family:var(--font-hand);
  font-size:26px; color:var(--gold); white-space:nowrap; text-shadow:0 0 10px rgba(255,210,122,.6);
}
.candles{position:absolute; top:-78px; left:50%; transform:translateX(-50%); display:flex; gap:14px;}
.candle{position:relative; width:6px; height:34px; background:linear-gradient(180deg,#ffe1b0,#d68a4a); border-radius:3px; cursor:pointer;}
.flame{
  position:absolute; top:-16px; left:50%; transform:translateX(-50%); width:10px; height:16px; border-radius:50% 50% 50% 50% / 65% 65% 35% 35%;
  background:radial-gradient(circle at 50% 70%, #fff3c4, var(--gold) 55%, #ff7a3d 90%);
  box-shadow:0 0 12px 3px rgba(255,180,80,.7); animation:flicker 1.1s ease-in-out infinite;
  transition:opacity .25s ease, transform .25s ease;
}
@keyframes flicker{0%,100%{transform:translateX(-50%) scale(1) rotate(-2deg);}50%{transform:translateX(-50%) scale(1.12) rotate(2deg);}}
.candle.out .flame{opacity:0; transform:translateX(-50%) scale(0);}
.smoke{position:absolute; top:-18px; left:50%; width:6px; height:6px; border-radius:50%; background:rgba(200,200,200,.5); animation:smokeUp 1s ease-out forwards; pointer-events:none;}
@keyframes smokeUp{0%{opacity:.6; transform:translate(-50%,0) scale(1);}100%{opacity:0; transform:translate(-50%,-40px) scale(2.4);}}
.cake-hint{margin-top:70px; font-size:13px; color:var(--pink-soft); opacity:.8;}

/* ---------- letter scene ---------- */
#screen-letter{z-index:5;}
.paper{
  width:100%; max-width:360px; min-height:320px; background:linear-gradient(180deg,#fdf6ec,#f7ecdf);
  border-radius:6px; box-shadow:0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,150,190,.25);
  padding:28px 24px; color:#3a1424; position:relative; transform:rotate(-0.6deg);
}
.paper::before{content:"";position:absolute; inset:10px; border:1px solid rgba(58,20,36,.12); border-radius:4px; pointer-events:none;}
.paper h2{font-family:var(--font-hand); font-size:28px; margin:0 0 12px; color:#7a2140;}
.paper p{font-family:var(--font-hand); font-size:19px; line-height:1.7; margin:0; white-space:pre-wrap; text-align:left;}
.cursor-blink{display:inline-block; width:2px; background:#7a2140; margin-left:1px; animation:blink 1s step-start infinite;}
@keyframes blink{50%{opacity:0;}}

/* ---------- memories scene ---------- */
#screen-memories{z-index:5;}
.memory-card{width:260px; height:320px; border-radius:16px; padding:14px; background:#fff; box-shadow:0 20px 50px rgba(0,0,0,.5); position:relative; transform:rotate(-1.5deg); transition:opacity .5s ease, transform .5s ease;}
.memory-photo{width:100%; height:250px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:40px; color:rgba(255,255,255,.85); overflow:hidden;}
.memory-photo img{width:100%; height:100%; object-fit:cover; border-radius:8px;}
.memory-caption{font-family:var(--font-hand); color:#3a1424; font-size:19px; margin-top:10px;}
.memory-card.fading{opacity:0; transform:rotate(-1.5deg) scale(.94);}
.dots{display:flex; gap:8px; margin-top:22px;}
.dot{width:7px; height:7px; border-radius:50%; background:rgba(255,150,190,.35); transition:background .3s ease, transform .3s ease;}
.dot.active{background:var(--pink); transform:scale(1.3); box-shadow:0 0 8px var(--glow);}
.memory-nav{display:flex; gap:22px; margin-top:18px;}
.nav-btn{width:42px; height:42px; border-radius:50%; border:1px solid rgba(255,150,190,.4); background:rgba(255,255,255,.05); color:var(--pink-pale); font-size:18px; cursor:pointer;}

/* ---------- final scene ---------- */
#screen-final{z-index:5;}
.big-heart{font-size:56px; margin-bottom:6px; animation:heartGlow 1.8s ease-in-out infinite;}
@keyframes heartGlow{0%,100%{transform:scale(1); filter:drop-shadow(0 0 12px var(--glow));}50%{transform:scale(1.14); filter:drop-shadow(0 0 26px var(--glow));}}
.final-actions{display:flex; gap:14px; margin-top:30px; flex-wrap:wrap; justify-content:center;}
.love-btn{
  padding:13px 26px; border-radius:999px; border:1px solid rgba(255,150,190,.5); background:rgba(255,61,125,.12);
  color:#fff; font-family:var(--font-body); font-weight:600; cursor:pointer; transition:transform .2s ease;
}
.love-btn:active{transform:scale(.92);}

/* confetti canvas */
#confettiCanvas{position:fixed; inset:0; z-index:80; pointer-events:none; width:100%; height:100%;}

@media (max-width:380px){
  .cake{width:190px;}
  .tier1{width:190px;}
  .tier2{width:150px;}
  .paper{padding:22px 18px;}
}
</style>
</head>
<body>
<div id="app">
  <button id="soundToggle" aria-label="toggle sound">🔈</button>
  <!-- 🔐 LOCK SCREEN -->
  <div class="screen active" id="screen-lock">
    <div class="eyebrow">private</div>
    <h1 class="title">Enter Secret Code</h1>

    <input id="lockInput" type="password" placeholder="Enter code"
      style="padding:12px 16px;border-radius:8px;border:none;margin-top:10px;outline:none;text-align:center;">

    <button class="glow-btn" id="btnUnlock">Unlock</button>

    <p id="lockError" style="color:#ff8fb8;margin-top:10px;font-size:13px;"></p>
  </div>
  <canvas id="confettiCanvas"></canvas>

  <!-- 1. LANDING -->
  <div class="screen" id="screen-landing">
    <div class="envelope-wrap">
      <div class="envelope"><div class="envelope-heart">💌</div></div>
    </div>
    <div class="eyebrow">for you</div>
    <h1 class="title">I made something special for you…</h1>
    <p class="sub">Something small, made with a lot of love. Turn your sound on, and open it when you're ready.</p>
    <button class="glow-btn" id="btnOpen">Tap to open</button>
  </div>

  <!-- 2. BALLOONS -->
  <div class="screen" id="screen-balloons">
    <div class="balloon-hint">
      <div class="eyebrow">step one</div>
      <h1 class="title" style="font-size:22px;">Pop every balloon 🎈</h1>
    </div>
    <div class="balloon-field" id="balloonField"></div>
  </div>

  <!-- 3. CAKE -->
  <div class="screen" id="screen-cake">
    <div class="eyebrow"></div>
    <div class="cake-wrap">
      <div class="cake" id="cakeEl">
        <div class="candles" id="candles"></div>
        <div class="icing-name" id="icingName"></div>
        <div class="tier tier2"><div class="drip"></div></div>
        <div class="tier tier1"><div class="drip"></div></div>
        <div class="plate"></div>
      </div>
    </div>
    <div class="cake-hint">Tap each flame ✨</div>
  </div>

  <!-- 4. LETTER -->
  <div class="screen" id="screen-letter">
    <div class="paper">
      <h2 id="letterTitle"></h2>
      <p id="letterBody"></p>
    </div>
    <button class="glow-btn" id="btnAfterLetter" style="opacity:0; pointer-events:none;">Continue</button>
  </div>

  <!-- 5. MEMORIES -->
  <div class="screen" id="screen-memories">
    <div class="eyebrow">our moments</div>
    <h1 class="title" style="font-size:22px;">A few of my favorites</h1>
    <div id="memoryStage"></div>
    <div class="dots" id="memoryDots"></div>
    <div class="memory-nav">
      <button class="nav-btn" id="memPrev">‹</button>
      <button class="nav-btn" id="memNext">›</button>
    </div>
    <button class="glow-btn" id="btnAfterMemories" style="margin-top:26px;">Continue</button>
  </div>

  <!-- 6. FINAL -->
  <div class="screen" id="screen-final">
    <div class="big-heart">❤️</div>
    <div class="eyebrow">always</div>
    <h1 class="title" id="finalMessage"></h1>
    <div class="final-actions">
      <button class="love-btn" id="btnLove">I love you</button>
      <button class="glow-btn" id="btnReplay" style="margin-top:0;">Replay again</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — change these to personalize the site.
   `img` on a memory can be a photo URL; if omitted a soft
   gradient placeholder with an emoji is used instead.
   ============================================================ */
const CONFIG = {
  name: "Anshu",
  lockCode: "G@ur@V@nshU",
  letterTitle: "My Dearest Anshu,",
  letterMessage: "Every year I get to celebrate you, and every year I somehow fall a little more in love with who you are.\n\nYou make ordinary days feel like magic, and today I just want the whole world to slow down for a second and celebrate the person who means everything to me.\n\nHappy Birthday, my love.\n\nYour Gourav",
  memories: [
    {
      caption: "Our Cutest selfie ❤️",
      img: "images/Memory1.jpg"
    },
    {
      caption: "Our First HandHolding Picture❤️",
      img: "images/Memory2.jpg"
    },
    {
      caption: "Our Sweetest Kissi😘",
      img: "images/Memory3.jpg"
    },
    {
      caption: "And She Is My Bachcha🥰",
      img: "images/Memory4.jpg"
    },
  ],
  finalMessage: "You are the best thing that ever happened to me.",
  candleCount: 5
};

/* ============================================================
   ENGINE — screen navigation
   ============================================================ */
const screens = ['lock','landing','balloons','cake','letter','memories','final'];
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

/* ============================================================
   AUDIO — synthesized, no external files needed
   ============================================================ */
let audioCtx = null, masterGain = null, musicNodes = [], musicTimer = null, muted = false;

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function noteFreq(semitonesFromA4){ return 440 * Math.pow(2, semitonesFromA4/12); }

function playPad(freqs, dur, vol){
  const t0 = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 1.2);
  g.gain.linearRampToValueAtTime(0, t0 + dur);
  g.connect(masterGain);
  freqs.forEach(f=>{
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = f;
    o.connect(g);
    o.start(t0);
    o.stop(t0 + dur);
  });
}

function startAmbientMusic(){
  ensureAudio();
  const chords = [
    [noteFreq(-24), noteFreq(-20), noteFreq(-17)],
    [noteFreq(-29), noteFreq(-25), noteFreq(-22)],
    [noteFreq(-26), noteFreq(-22), noteFreq(-19)],
    [noteFreq(-24), noteFreq(-19), noteFreq(-15)]
  ];
  let i = 0;
  function loop(){
    if(!muted) playPad(chords[i % chords.length], 7.5, 0.045);
    i++;
    musicTimer = setTimeout(loop, 6500);
  }
  loop();
}

function playPop(){
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.15;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1200;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.5, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.15);
  noise.connect(bp); bp.connect(g); g.connect(masterGain);
  noise.start(t0);

  const o = audioCtx.createOscillator();
  o.type = 'triangle';
  o.frequency.setValueAtTime(700, t0);
  o.frequency.exponentialRampToValueAtTime(180, t0 + 0.12);
  const og = audioCtx.createGain();
  og.gain.setValueAtTime(0.3, t0);
  og.gain.exponentialRampToValueAtTime(0.001, t0 + 0.12);
  o.connect(og); og.connect(masterGain);
  o.start(t0); o.stop(t0+0.13);
}

function playBlow(){
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.4;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(1800, t0);
  lp.frequency.exponentialRampToValueAtTime(200, t0+0.4);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.25, t0);
  g.gain.linearRampToValueAtTime(0, t0+0.4);
  noise.connect(lp); lp.connect(g); g.connect(masterGain);
  noise.start(t0);
}

function playCelebration(){
  ensureAudio();
  const notes = [0,4,7,12,16].map(noteFreq);
  notes.forEach((f,idx)=>{
    const t0 = audioCtx.currentTime + idx*0.09;
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = f * 2;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, t0);
    g.gain.linearRampToValueAtTime(0.22, t0+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t0+0.9);
    o.connect(g); g.connect(masterGain);
    o.start(t0); o.stop(t0+0.9);
  });
}

document.getElementById('soundToggle').addEventListener('click', ()=>{
  muted = !muted;
  document.getElementById('soundToggle').textContent = muted ? '🔇' : '🔈';
  if(masterGain) masterGain.gain.value = muted ? 0 : 0.5;
});

/* ============================================================
   FLOATING HEART PARTICLES (landing ambience)
   ============================================================ */
let particleTimer = null;
function spawnHeart(){
  const el = document.createElement('div');
  el.className = 'heart-particle';
  el.textContent = ['💕','💗','✨','🩷'][Math.floor(Math.random()*4)];
  el.style.left = Math.random()*90 + '%';
  el.style.setProperty('--drift', (Math.random()*60-30)+'px');
  const dur = 6 + Math.random()*5;
  el.style.animationDuration = dur+'s';
  el.style.fontSize = (12+Math.random()*10)+'px';
  document.getElementById('screen-landing').appendChild(el);
  setTimeout(()=>el.remove(), dur*1000);
}
function startParticles(){
  if(particleTimer) return;
  particleTimer = setInterval(spawnHeart, 550);
}

/* ============================================================
   CONFETTI (canvas)
   ============================================================ */
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
let confettiParticles = [];
let confettiRAF = null;
const confettiColors = ['#ff3d7d','#ff8fb8','#ffd27a','#ffffff','#ffd7e6'];

function burstConfetti(x, y, count){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2 + Math.random()*5;
    confettiParticles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 2,
      size: 4 + Math.random()*5,
      color: confettiColors[Math.floor(Math.random()*confettiColors.length)],
      rot: Math.random()*Math.PI,
      vrot: (Math.random()-0.5)*0.3,
      life: 1
    });
  }
  if(!confettiRAF) animateConfetti();
}

function animateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiParticles.forEach(p=>{
    p.vy += 0.12;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vrot;
    p.life -= 0.012;
    ctx.save();
    ctx.globalAlpha = Math.max(p.life,0);
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
    ctx.restore();
  });
  confettiParticles = confettiParticles.filter(p=>p.life>0 && p.y < canvas.height+50);
  if(confettiParticles.length>0){
    confettiRAF = requestAnimationFrame(animateConfetti);
  } else {
    confettiRAF = null;
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
}

/* ============================================================
   1. LANDING -> open
   ============================================================ */
document.getElementById('btnOpen').addEventListener('click', ()=>{
  ensureAudio();
  startAmbientMusic();
  if(particleTimer){ clearInterval(particleTimer); particleTimer=null; }
  initBalloons();
  showScreen('balloons');
});
startParticles();

  /* 🔐 LOCK SYSTEM */
  document.getElementById('btnUnlock').addEventListener('click', ()=>{
    const val = document.getElementById('lockInput').value;

    if(val === CONFIG.lockCode){
      showScreen('landing');
    } else {
      document.getElementById('lockError').textContent = "Wrong code 💔";
    }
  });

/* ============================================================
   2. BALLOONS
   ============================================================ */
const balloonColors = ['#ff3d7d','#ff6fa0','#ff8fb8','#ffb3d1','#e0417a'];
let remainingBalloons = 0;

function initBalloons(){
  const field = document.getElementById('balloonField');
  field.innerHTML = '';
  const count = 8;
  remainingBalloons = count;
  for(let i=0;i<count;i++){
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = (6 + Math.random()*80) + '%';
    b.style.background = `radial-gradient(circle at 35% 30%, #fff5, ${balloonColors[i % balloonColors.length]})`;
    b.style.animationDuration = (7 + Math.random()*4) + 's';
    b.style.animationDelay = (Math.random()*3) + 's';
    b.style.setProperty('--sway', (Math.random()*40-20)+'px');
    b.addEventListener('click', onBalloonPop, {once:true});
    field.appendChild(b);
  }
}

function onBalloonPop(e){
  const b = e.currentTarget;
  const rect = b.getBoundingClientRect();
  b.classList.add('pop');
  playPop();
  burstConfetti(rect.left + rect.width/2, rect.top + rect.height/2, 26);
  setTimeout(()=>b.remove(), 300);
  remainingBalloons--;
  if(remainingBalloons <= 0){
    setTimeout(()=>{
      initCake();
      showScreen('cake');
    }, 700);
  }
}

/* ============================================================
   3. CAKE + CANDLES
   ============================================================ */
let litCount = 0;
function initCake(){
  document.getElementById('icingName').textContent = CONFIG.name;
  const wrap = document.getElementById('candles');
  wrap.innerHTML = '';
  litCount = CONFIG.candleCount;
  for(let i=0;i<CONFIG.candleCount;i++){
    const c = document.createElement('div');
    c.className = 'candle lit';
    c.innerHTML = '<div class="flame"></div>';
    c.addEventListener('click', ()=>onCandleBlow(c), {once:true});
    wrap.appendChild(c);
  }
}

function onCandleBlow(candleEl){
  candleEl.classList.add('out');
  candleEl.classList.remove('lit');
  playBlow();
  const smoke = document.createElement('div');
  smoke.className = 'smoke';
  candleEl.appendChild(smoke);
  setTimeout(()=>smoke.remove(), 1000);
  litCount--;
  if(litCount <= 0){
    setTimeout(()=>{
      const rect = document.getElementById('cakeEl').getBoundingClientRect();
      burstConfetti(rect.left+rect.width/2, rect.top, 60);
      playCelebration();
      setTimeout(()=>{
        initLetter();
        showScreen('letter');
      }, 1400);
    }, 300);
  }
}

/* ============================================================
   4. LETTER (typewriter)
   ============================================================ */
function initLetter(){
  document.getElementById('letterTitle').textContent = CONFIG.letterTitle;
  const bodyEl = document.getElementById('letterBody');
  bodyEl.innerHTML = '<span class="cursor-blink">&nbsp;</span>';
  const btn = document.getElementById('btnAfterLetter');
  btn.style.opacity = 0;
  btn.style.pointerEvents = 'none';

  const text = CONFIG.letterMessage;
  let i = 0;
  function typeStep(){
    if(i <= text.length){
      bodyEl.innerHTML = escapeHtml(text.slice(0,i)) + '<span class="cursor-blink">&nbsp;</span>';
      i++;
      setTimeout(typeStep, 28);
    } else {
      bodyEl.innerHTML = escapeHtml(text);
      btn.style.transition = 'opacity .8s ease';
      btn.style.opacity = 1;
      btn.style.pointerEvents = 'auto';
    }
  }
  setTimeout(typeStep, 500);
}
function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.getElementById('btnAfterLetter').addEventListener('click', ()=>{
  initMemories();
  showScreen('memories');
});

/* ============================================================
   5. MEMORIES
   ============================================================ */
let memIndex = 0;
function renderMemory(idx, animate){
  const stage = document.getElementById('memoryStage');
  const m = CONFIG.memories[idx];
  const card = document.createElement('div');
  card.className = 'memory-card';
  card.innerHTML = `
    <div class="memory-photo" style="background:${m.img ? 'transparent' : (m.gradient||'linear-gradient(135deg,#ff9ec7,#7a2b4a)')}">
      ${m.img ? `<img src="${m.img}" alt="${m.caption}">` : (m.emoji||'💗')}
    </div>
    <div class="memory-caption">${m.caption}</div>
  `;
  if(animate && stage.firstChild){
    const old = stage.firstChild;
    old.classList.add('fading');
    setTimeout(()=>old.remove(), 400);
  } else {
    stage.innerHTML = '';
  }
  stage.appendChild(card);

  const dotsWrap = document.getElementById('memoryDots');
  dotsWrap.innerHTML = '';
  CONFIG.memories.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'dot' + (i===idx ? ' active' : '');
    dotsWrap.appendChild(d);
  });
}
function initMemories(){
  memIndex = 0;
  renderMemory(0,false);
}
document.getElementById('memPrev').addEventListener('click', ()=>{
  memIndex = (memIndex - 1 + CONFIG.memories.length) % CONFIG.memories.length;
  renderMemory(memIndex, true);
});
document.getElementById('memNext').addEventListener('click', ()=>{
  memIndex = (memIndex + 1) % CONFIG.memories.length;
  renderMemory(memIndex, true);
});
document.getElementById('btnAfterMemories').addEventListener('click', ()=>{
  initFinal();
  showScreen('final');
});

/* ============================================================
   6. FINAL
   ============================================================ */
function initFinal(){
  document.getElementById('finalMessage').textContent = CONFIG.finalMessage;
  document.getElementById('btnLove').textContent = 'I love you';
}
document.getElementById('btnLove').addEventListener('click', (e)=>{
  const rect = e.currentTarget.getBoundingClientRect();
  burstConfetti(rect.left+rect.width/2, rect.top, 40);
  playCelebration();
  e.currentTarget.textContent = 'I love you too, forever 💕';
});
document.getElementById('btnReplay').addEventListener('click', ()=>{
  showScreen('landing');
  startParticles();
});

/* ============================================================
   Optional: read overrides from URL for easy sharing, e.g.
   ?name=Ananya  (message/letter overrides can be added the
   same way if you want a fully link-based share flow)
   ============================================================ */
(function applyUrlOverrides(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('name')) CONFIG.name = params.get('name');
  if(params.get('final')) CONFIG.finalMessage = params.get('final');
})();
</script>
